# ~/.config/hypr/hyprsunset.conf
# hyprsunset configuration

# The maximum gamma limit allowed (default 100%)
max-gamma = 150

# Morning/Day: Normal colors
profile {
    time = 07:00
    identity = true
}

# Evening: Gentle warm light
profile {
    time = 18:30
    temperature = 5000
    gamma = 1.0
}

# Night: Warmer light for sleep preparation
profile {
    time = 22:00
    temperature = 3800
    gamma = 0.95
}

# Late Night: Minimal blue light
profile {
    time = 00:30
    temperature = 3000
    gamma = 0.90
}
